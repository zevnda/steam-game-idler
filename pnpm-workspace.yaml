packages:
  - '.'
  - 'docs'

# esbuild/sharp both need their native postinstall scripts to run to work at all (esbuild's binary
# download, sharp's prebuilt libvips binding) - pnpm blocks these by default as a supply-chain
# guard. Allowlisted here instead of relying on each machine's local `pnpm approve-builds` cache,
# which a fresh clone or CI runner never has.
onlyBuiltDependencies:
  - esbuild
  - sharp
