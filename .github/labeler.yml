# Infra labels
ci:core:
- all:
  - changed-files:
    - any-glob-to-any-file: ".github/**/*"
    - all-globs-to-all-files: '!**/workflows/*'
    - all-globs-to-all-files: '!**/ISSUE_TEMPLATE/*'

ci:workflows:
- all:
  - changed-files:
    - any-glob-to-any-file: ".github/workflows/**/*"

ci:templates:
- all:
  - changed-files:
    - any-glob-to-any-file: ".github/ISSUE_TEMPLATE/**/*"

versioning:
- all:
  - changed-files:
    - any-glob-to-any-file: "latest.json"

notifications:
- all:
  - changed-files:
    - any-glob-to-any-file: "notifications.json"

# Documentation labels (docs/ — Fumadocs site)
docs:config:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "docs/.gitignore"
      - "docs/*.config.*"
      - "docs/tsconfig.json"
      - "docs/vercel.json"

docs:deps:
- all:
  - changed-files:
    - any-glob-to-any-file: "docs/package.json"

docs:site:
- all:
  - changed-files:
    - any-glob-to-any-file: "docs/**/*"

docs:content:
- all:
  - changed-files:
    - any-glob-to-any-file: "docs/app/(marketing)/docs/_content/**/*"

docs:changelog:
- all:
  - changed-files:
    - any-glob-to-any-file: "docs/changelogs/**/*"

docs:assets:
- all:
  - changed-files:
    - any-glob-to-any-file: "docs/public/**/*"

# Feature areas — one label per feature that spans both the Next.js UI
# (src/features/<x>) and its Tauri backend module (src-tauri/src/<x>), so a
# PR touching one conceptual feature gets one label instead of two disjoint
# ui:/tauri: ones. Backends with no single owning feature (steam_community,
# local_steam — shared across multiple areas per CLAUDE.md) stay as
# tauri:* infra labels below instead of being forced into an area.
area:sign-in:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/account-switcher/**/*"
      - "src/features/agent-sign-in/**/*"
      - "src/features/local-sign-in/**/*"
      - "src/features/sign-in-landing/**/*"
      - "src-tauri/src/steam_agent/**/*"

area:achievements:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/achievement-manager/**/*"
      - "src-tauri/src/achievements/**/*"

area:achievement-unlocker:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/achievement-unlocker/**/*"
      - "src-tauri/src/achievement_unlocker/**/*"

area:auto-idle:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/auto-idle/**/*"
      - "src-tauri/src/auto_idle/**/*"

area:card-farming:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/card-farming/**/*"
      - "src-tauri/src/card_farming/**/*"

area:favorites:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/favorites/**/*"
      - "src-tauri/src/favorites/**/*"

area:free-games:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/free-games/**/*"
      - "src-tauri/src/free_games/**/*"

area:games-list:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/games-list/**/*"
      - "src-tauri/src/games/**/*"

area:idling:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/idling/**/*"
      - "src-tauri/src/idling/**/*"

area:inventory-manager:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/inventory-manager/**/*"
      - "src-tauri/src/inventory/**/*"

area:settings:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/features/settings/**/*"
      - "src-tauri/src/settings/**/*"

# React/Next.js labels — shared UI layers only; feature UI is covered by area:* above
ui:shared:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src/shared/components/**/*"
      - "src/shared/search/**/*"

ui:hooks:
- all:
  - changed-files:
    - any-glob-to-any-file: "src/shared/hooks/**/*"

ui:stores:
- all:
  - changed-files:
    - any-glob-to-any-file: "src/shared/stores/**/*"

ui:theme:
- all:
  - changed-files:
    - any-glob-to-any-file: "src/shared/theme/**/*"

ui:utils:
- all:
  - changed-files:
    - any-glob-to-any-file: "src/shared/utils/**/*"

ui:i18n:
- all:
  - changed-files:
    - any-glob-to-any-file: "src/i18n/**/*"

ui:pages:
- all:
  - changed-files:
    - any-glob-to-any-file: "src/pages/**/*"

ui:styles:
- all:
  - changed-files:
    - any-glob-to-any-file: "src/styles/**/*"

ui:assets:
- all:
  - changed-files:
    - any-glob-to-any-file: "public/**/*"

# Tauri specific labels
tauri:
- all:
  - changed-files:
    - any-glob-to-any-file: "src-tauri/**/*"
    - all-globs-to-all-files: '!src-tauri/src/**/*'
    - all-globs-to-all-files: '!src-tauri/build.rs'
    - all-globs-to-all-files: '!src-tauri/Cargo.lock'
    - all-globs-to-all-files: '!src-tauri/Cargo.toml'
    - all-globs-to-all-files: '!src-tauri/*.json'

tauri:core:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src-tauri/build.rs"
      - "src-tauri/src/main.rs"
      - "src-tauri/src/lib.rs"

tauri:deps:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src-tauri/Cargo.lock"
      - "src-tauri/Cargo.toml"

tauri:config:
- all:
  - changed-files:
    - any-glob-to-any-file: "src-tauri/*.json"

# Cross-cutting single-file infra with no dedicated feature area
tauri:shared:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "src-tauri/src/async_utils.rs"
      - "src-tauri/src/credential_store.rs"
      - "src-tauri/src/embedded_api_key.rs"
      - "src-tauri/src/error.rs"
      - "src-tauri/src/fs_utils.rs"
      - "src-tauri/src/legacy_migration.rs"
      - "src-tauri/src/logging.rs"
      - "src-tauri/src/platform.rs"
      - "src-tauri/src/steam_utility_exe.rs"
      - "src-tauri/src/steam_web_api.rs"
      - "src-tauri/src/tray.rs"
      - "src-tauri/src/zoom.rs"

tauri:subscription:
- all:
  - changed-files:
    - any-glob-to-any-file: "src-tauri/src/subscription.rs"

tauri:updater:
- all:
  - changed-files:
    - any-glob-to-any-file: "src-tauri/src/updater.rs"

# Shared backends used by more than one area (see CLAUDE.md: "card farming /
# inventory-manager / trading cards are separate infrastructure")
tauri:local-steam:
- all:
  - changed-files:
    - any-glob-to-any-file: "src-tauri/src/local_steam/**/*"

tauri:steam-community:
- all:
  - changed-files:
    - any-glob-to-any-file: "src-tauri/src/steam_community/**/*"

tauri:customization:
- all:
  - changed-files:
    - any-glob-to-any-file: "src-tauri/src/customization/**/*"

tauri:debug:
- all:
  - changed-files:
    - any-glob-to-any-file: "src-tauri/src/debug/**/*"

# Core labels
core:deps:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "package.json"
      - "pnpm-lock.yaml"

core:config:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - ".gitignore"
      - ".gitmodules"
      - ".npmrc"
      - "*.config.*"
      - "tsconfig.json"
      - ".husky/*"
      - "*.yml"

core:docs:
- all:
  - changed-files:
    - any-glob-to-any-file: "README.md"

# Library specific labels
libs:
- all:
  - changed-files:
    - any-glob-to-any-file:
      - "libs/**/*"
      - "libs/**"

# Types of changes labels
bugfix:
- all:
  - head-branch: ["^fix", "fix/"]

feature:
- all:
  - head-branch: ["^feat", "feat/"]

chore:
- all:
  - head-branch: ["^chore", "chore/"]

refactor:
- all:
  - head-branch: ["^refactor", "refactor/"]

ci:
- all:
  - head-branch: ["^ci", "ci/"]

config:
- all:
  - head-branch: ["^config", "config/"]

docs:
- all:
  - head-branch: ["^docs", "docs/"]

build:
- all:
  - head-branch: ["^build", "build/"]

performance:
- all:
  - head-branch: ["^perf", "perf/"]

dependencies:
- all:
  - head-branch: ["^dependabot/"]
