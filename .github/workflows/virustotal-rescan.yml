name: VirusTotal daily rescan

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rescan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve latest release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --json tagName --jq .tagName)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p vt-assets
          gh release download "${{ steps.tag.outputs.tag }}" \
            --pattern "*x64-setup.exe" \
            --pattern "*x64-portable.zip" \
            --dir vt-assets \
            --clobber

      - name: Rescan assets with VirusTotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          mkdir -p vt-results
          i=0
          for f in vt-assets/*; do
            i=$((i + 1))
            name=$(basename "$f")
            echo "Rescanning $name..."
            bash .github/scripts/vt-scan.sh rescan "$f" "$name" | tee "vt-results/$i.json"
          done

      - name: Diff against known state, notify and commit on change
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_SECURITY_WEBHOOK: ${{ secrets.DISCORD_SECURITY_WEBHOOK }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin automation/vt-status > /dev/null 2>&1; then
            git fetch origin automation/vt-status
            git checkout -B automation/vt-status origin/automation/vt-status
          else
            git checkout --orphan automation/vt-status
            git rm -rf . > /dev/null 2>&1 || true
          fi

          if [ ! -f vt-status.json ]; then
            echo '{"schema_version":1,"releases":{}}' > vt-status.json
          fi

          changed=0
          for rf in vt-results/*.json; do
            name=$(jq -r '.name' "$rf")

            old_vendors=$(jq -c --arg tag "$TAG" --arg name "$name" '.releases[$tag][$name].flagged_vendors // []' vt-status.json)
            new_vendors=$(jq -c '.flagged_vendors' "$rf")

            added=$(jq -cn --argjson old "$old_vendors" --argjson new "$new_vendors" '$new - $old')
            removed=$(jq -cn --argjson old "$old_vendors" --argjson new "$new_vendors" '$old - $new')
            still=$(jq -cn --argjson new "$new_vendors" --argjson added "$added" '$new - $added')

            added_count=$(echo "$added" | jq 'length')
            removed_count=$(echo "$removed" | jq 'length')

            # Only alert when the flagged-vendor set actually changed, not every day it stays flagged
            if [ "$added_count" -gt 0 ] || [ "$removed_count" -gt 0 ]; then
              changed=1
              color=15158332
              title="VirusTotal: new detection on existing release asset"
              if [ "$added_count" -eq 0 ]; then
                color=3066993
                title="VirusTotal: previous detection cleared"
              fi

              permalink=$(jq -r '.permalink' "$rf")

              fields="[]"
              if [ "$added_count" -gt 0 ]; then
                fields=$(echo "$fields" | jq --arg v "$(echo "$added" | jq -r 'join(", ")')" '. + [{name:"Newly flagging", value:$v}]')
              fi
              if [ "$removed_count" -gt 0 ]; then
                fields=$(echo "$fields" | jq --arg v "$(echo "$removed" | jq -r 'join(", ")')" '. + [{name:"No longer flagging", value:$v}]')
              fi
              still_str=$(echo "$still" | jq -r 'join(", ")')
              if [ -n "$still_str" ]; then
                fields=$(echo "$fields" | jq --arg v "$still_str" '. + [{name:"Still flagging (unchanged)", value:$v}]')
              fi
              fields=$(echo "$fields" | jq --arg v "$permalink" '. + [{name:"Report", value:$v}]')

              payload=$(jq -n \
                --arg tag "$TAG" \
                --arg name "$name" \
                --arg title "$title" \
                --argjson color "$color" \
                --argjson fields "$fields" \
                '{
                  embeds: [{
                    title: $title,
                    color: $color,
                    description: ("**Steam Game Idler " + $tag + "** — " + $name),
                    fields: $fields
                  }]
                }')
              curl -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_SECURITY_WEBHOOK"

              tmp=$(mktemp)
              jq --arg tag "$TAG" --arg name "$name" --slurpfile r "$rf" '
                .releases[$tag] = ((.releases[$tag] // {}) + {
                  ($name): {
                    sha256: $r[0].sha256,
                    flagged_vendors: $r[0].flagged_vendors,
                    stats: { malicious: $r[0].malicious, suspicious: $r[0].suspicious, undetected: $r[0].undetected, harmless: $r[0].harmless },
                    permalink: $r[0].permalink,
                    last_checked: (now | todate)
                  }
                })
              ' vt-status.json > "$tmp"
              mv "$tmp" vt-status.json
            else
              echo "$name: no change in flagged vendors."
            fi
          done

          if [ "$changed" -eq 1 ]; then
            git add vt-status.json
            git commit -m "chore(vt-status): update detection state for $TAG"
            git push origin automation/vt-status
          else
            echo "No state changes to commit."
          fi
