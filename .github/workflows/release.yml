name: Build release bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New Version"
        required: true
      is_major:
        description: "Major update"
        required: false
        type: boolean
        default: false
      force_dotnet_build:
        description: "Force .NET rebuild"
        required: false
        type: boolean
        default: false
      force_pnpm_install:
        description: "Force fresh pnpm install"
        required: false
        type: boolean
        default: false
      force_cargo_clean:
        description: "Force cargo clean"
        required: false
        type: boolean
        default: false
      force_nextjs_build:
        description: "Force Next.js rebuild"
        required: false
        type: boolean
        default: false

run-name: Build release v${{ github.event.inputs.version }}

# Prevents two dispatches from racing (both bumping the same version files / publishing at once).
# cancel-in-progress: false queues a second dispatch behind the first rather than auto-killing it -
# manually cancelling a run yourself from the Actions UI/CLI is unaffected by this and still works
# at any time.
concurrency:
  group: release
  cancel-in-progress: false

# Least privilege by default - only build_release_bundle (the job that actually creates the
# release/PR/deletes the build artifact) is granted elevated scopes, below.
permissions: {}

jobs:
  fetch_previous_version:
    runs-on: ubuntu-latest
    outputs:
      previous_version: ${{ steps.get_version.outputs.previous_version }}
    steps:
      - name: Get latest release version
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticated request avoids the 60 req/hr unauthenticated rate limit; a token is still
          # valid for this even under this workflow's now-zero default permissions.
          RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/releases/latest)
          PREVIOUS_VERSION=$(echo "$RESPONSE" | jq -r .tag_name)

          if [ -z "$PREVIOUS_VERSION" ] || [ "$PREVIOUS_VERSION" = "null" ]; then
            echo "::error::Failed to fetch latest release version from GitHub API. Response was:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Found previous version: $PREVIOUS_VERSION"
          echo "previous_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT

  validate_version:
    runs-on: ubuntu-latest
    needs: fetch_previous_version
    steps:
      - name: Validate semantic version format
        id: validate_format
        uses: matt-usurp/validate-semver@v2
        with:
          version: ${{ github.event.inputs.version }}
      
      - name: Validate version increment
        uses: actions/github-script@v7
        with:
          script: |
            const prev = '${{ needs.fetch_previous_version.outputs.previous_version }}'.replace(/^v/, '');
            const next = '${{ github.event.inputs.version }}'.replace(/^v/, '');
            
            const [prevMajor, prevMinor, prevPatch] = prev.split('.').map(Number);
            const [nextMajor, nextMinor, nextPatch] = next.split('.').map(Number);
            
            // Check if it's a valid increment
            const isMajor = nextMajor > prevMajor && nextMinor === 0 && nextPatch === 0;
            const isMinor = nextMajor === prevMajor && nextMinor > prevMinor && nextPatch === 0;
            const isPatch = nextMajor === prevMajor && nextMinor === prevMinor && nextPatch === prevPatch + 1;
            
            if (!isMajor && !isMinor && !isPatch) {
              const validOptions = [
                `${prevMajor}.${prevMinor}.${prevPatch + 1} (patch)`,
                `${prevMajor}.${prevMinor + 1}.0 (minor)`,
                `${prevMajor + 1}.0.0 (major)`
              ];

              core.setFailed(
                `❌ Invalid version increment!\n\n` +
                `Current: ${prev}\n` +
                `Attempted: ${next}\n\n` +
                `Valid options:\n${validOptions.map(v => `  • ${v}`).join('\n')}`
              );
              return;
            }

            console.log(`✅ Valid version increment: ${prev} → ${next}`);
            await core.summary
              .addHeading('Release version')
              .addRaw(`Bumping ${prev} → ${next}`)
              .write();

  build_dotnet_libs:
    runs-on: windows-latest
    needs: [fetch_previous_version, validate_version]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Prepare NuGet cache directory
        run: |
          # Create directory if it doesn't exist
          mkdir -Force "C:\Users\runneradmin\.nuget\packages"
          # Get and report actual NuGet packages location
          dotnet nuget locals global-packages --list
        shell: pwsh

      - name: Setup NuGet cache
        id: cache-msbuild
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET cache
        id: cache-dotnet
        uses: actions/cache@v4
        with:
          path: src-tauri/libs/
          key: ${{ runner.os }}-dotnet-${{ hashFiles('libs/**/*.cs', 'libs/**/*.csproj', '.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      - name: Build SteamUtility
        if: steps.cache-dotnet.outputs.cache-hit != 'true' || github.event.inputs.force_dotnet_build == 'true'
        # -o is resolved relative to this step's cwd (repo root), not the project file's directory.
        # DebugType=none - tauri.conf.json bundles everything under libs/*, so a .pdb here would
        # otherwise ship in the installer for nothing. Single dotnet publish step now that the old
        # Steamworks.NET SteamUtility and SteamKit2 SteamAgent projects have been merged into one.
        # $ErrorActionPreference/$LASTEXITCODE check: a pwsh step's pass/fail is the wrapping
        # pwsh.exe exit code, NOT $LASTEXITCODE - a failing dotnet publish would otherwise report
        # this step green and silently carry a stale/missing SteamUtility.exe into the release.
        # PublishSingleFile=false (deliberately, was true) - the bundled single-file exe was
        # confirmed via side-by-side VirusTotal testing to be what SecureAge's engine flags as
        # malicious (a self-extracting single-file .NET bundle reads as packer-like behavior to its
        # heuristics); the plain multi-file self-contained output came back clean across several
        # test configurations. SteamUtility.csproj's RemoveDiagnosticOnlyPublishFiles target prunes
        # the resulting loose-file output back down close to the old single-file size.
        run: |
          $ErrorActionPreference = 'Stop'
          dotnet publish .\libs\SteamUtility\SteamUtility.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishTrimmed=true -p:DebugType=none -o .\src-tauri\libs\
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed with exit code $LASTEXITCODE" }
        shell: pwsh

      - name: Upload built .NET libraries
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-libs
          path: src-tauri/libs/
          retention-days: 1

      - name: Record dotnet build summary
        shell: pwsh
        run: |
          $usedCache = "${{ steps.cache-dotnet.outputs.cache-hit }}" -eq 'true' -and "${{ github.event.inputs.force_dotnet_build }}" -ne 'true'
          $source = if ($usedCache) { 'cache' } else { 'fresh build' }
          "## .NET build`nSteamUtility.exe: $source" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  build_release_bundle:
    needs: [build_dotnet_libs, fetch_previous_version, validate_version]
    timeout-minutes: 30
    runs-on: windows-latest
    permissions:
      contents: write # create the GitHub release (softprops/action-gh-release)
      pull-requests: write # open the version-bump PR
      actions: write # delete the dotnet-libs artifact in the cleanup step
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm cache
        id: cache-pnpm
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.OS }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.OS }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies (pnpm)
        if: steps.cache-pnpm.outputs.cache-hit != 'true' || github.event.inputs.force_pnpm_install == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pnpm install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) { throw "pnpm install failed with exit code $LASTEXITCODE" }

      - name: Setup Next.js cache
        id: cache-nextjs
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.OS }}-nextjs-${{ hashFiles('**.[jt]sx', '**.[jt]s', 'package.json') }}
          restore-keys: |
            ${{ runner.OS }}-nextjs-

      - name: Clean Next.js cache
        if: steps.cache-nextjs.outputs.cache-hit != 'true' || github.event.inputs.force_nextjs_build == 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path ".next") {
            Remove-Item -Recurse -Force .next
            Write-Host "Next.js cache cleared"
          } else {
            Write-Host "No Next.js cache found"
          }
        shell: pwsh

      - name: Setup Rust cache
        id: cache-rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Clean Cargo artifacts
        if: steps.cache-rust.outputs.cache-hit != 'true' || github.event.inputs.force_cargo_clean == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cargo clean
          if ($LASTEXITCODE -ne 0) { throw "cargo clean failed with exit code $LASTEXITCODE" }
        working-directory: ./src-tauri

      - name: Update version numbers
        id: update-versions
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $previousVersion = "${{ needs.fetch_previous_version.outputs.previous_version }}"
          $newVersion = "${{ github.event.inputs.version }}"

          # latest.json is what the Tauri updater plugin polls on every existing install - if this
          # replace silently no-ops (e.g. $previousVersion doesn't textually match file content),
          # the release still gets published but no existing user's auto-update would ever fire,
          # since latest.json would still claim the old version is current. Verify both files
          # actually changed rather than trusting the replace succeeded.
          #
          # Get-Content returns a string array (one element per line). Applying -match/-notmatch
          # to an array does NOT yield a boolean - it returns the subset of elements that satisfy
          # the condition, which for -notmatch is "every line that doesn't contain the version"
          # (i.e. almost every line in the file). That array is always non-empty and therefore
          # always truthy, so the check would throw unconditionally regardless of whether the
          # replace worked. Join to a single string first so -notmatch actually evaluates the
          # whole file content as one match target.
          $tauriConf = Get-Content src-tauri/tauri.conf.json
          $updatedTauriConf = $tauriConf -replace [regex]::Escape($previousVersion), $newVersion
          if (($updatedTauriConf -join "`n") -notmatch [regex]::Escape($newVersion)) {
            throw "tauri.conf.json version replace did not match - previous_version ($previousVersion) may not match file content"
          }
          $updatedTauriConf | Set-Content src-tauri/tauri.conf.json

          $latest = Get-Content latest.json
          $updatedLatest = $latest -replace [regex]::Escape($previousVersion), $newVersion
          if (($updatedLatest -join "`n") -notmatch [regex]::Escape($newVersion)) {
            throw "latest.json version replace did not match - previous_version ($previousVersion) may not match file content"
          }
          $updatedLatest | Set-Content latest.json

          # package.json/Cargo.toml are stuck at 0.1.0, not the previous release tag, so a
          # $previousVersion replace (as above) would silently match nothing. Bump each directly
          # instead. Neither value feeds the shipped exe's FileVersion/ProductVersion (that comes
          # from tauri.conf.json alone) - this is version-string hygiene only.
          npm pkg set version="$newVersion"
          if ($LASTEXITCODE -ne 0) { throw "npm pkg set failed with exit code $LASTEXITCODE" }

          # Cargo.toml has exactly one `version = "..."` line (under [package], no dependency-table
          # collision) - confirmed via grep before relying on this regex.
          $cargoToml = Get-Content src-tauri/Cargo.toml
          $updatedCargoToml = $cargoToml -replace '^version = "[^"]+"$', "version = `"$newVersion`""
          if (($updatedCargoToml -join "`n") -notmatch [regex]::Escape($newVersion)) {
            throw "Cargo.toml version replace did not match expected 'version = `"...`"' line"
          }
          $updatedCargoToml | Set-Content src-tauri/Cargo.toml

      - name: Create .env file
        run: |
          echo "KEY=${{ secrets.KEY }}" > .env
        shell: pwsh
        working-directory: ${{ github.workspace }}

      - name: Download built .NET libraries
        uses: actions/download-artifact@v4
        with:
          name: dotnet-libs
          path: src-tauri/libs/

      - name: Build and package Tauri app
        run: |
          $ErrorActionPreference = 'Stop'
          $env:NEXT_TELEMETRY_DISABLED = "1"
          $env:TAURI_CI = "1"
          pnpm tauri build
          if ($LASTEXITCODE -ne 0) { throw "pnpm tauri build failed with exit code $LASTEXITCODE" }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh

      - name: Record build artifacts summary
        shell: pwsh
        run: |
          $bundleDir = "./src-tauri/target/release/bundle/nsis"
          $produced = if (Test-Path $bundleDir) { Get-ChildItem $bundleDir -File | ForEach-Object { $_.Name } } else { @() }
          $lines = @("## Tauri bundle output")
          if ($produced.Count -eq 0) {
            $lines += "No files found in $bundleDir"
          } else {
            $lines += $produced | ForEach-Object { "- $_" }
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Update latest.json with signature
        shell: pwsh
        # latest.json's signature is what the Tauri updater verifies against on every existing
        # install - if this python invocation throws (e.g. the .sig file is missing because the
        # build silently failed earlier) and the exit code goes unchecked, this step would report
        # green while shipping a stale/wrong signature, breaking auto-update for the whole release.
        run: |
          python -c "
          import base64
          import json

          nsis_signature_path = './src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.nsis.zip.sig'
          latest_json_path = './latest.json'

          with open(nsis_signature_path, 'r') as sig_file:
              new_signature = sig_file.read().strip()

          with open(latest_json_path, 'r') as json_file:
              latest_json = json.load(json_file)

          latest_json['platforms']['windows-x86_64']['signature'] = new_signature

          is_major = True if '${{ github.event.inputs.is_major }}' == 'true' else False
          latest_json['major'] = is_major

          with open(latest_json_path, 'w') as json_file:
              json.dump(latest_json, json_file, indent=2)

          print('Updated latest.json with new signature')
          "
          if ($LASTEXITCODE -ne 0) { throw "Updating latest.json signature failed with exit code $LASTEXITCODE" }

      - uses: actions/create-github-app-token@v1
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create PR for version changes
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "chore(version): bump to ${{ github.event.inputs.version }}"
          title: "chore(version): bump to ${{ github.event.inputs.version }}"
          body: |
            Automated version bump for release [v${{ github.event.inputs.version }}](https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.version }})

            Generated by workflow run [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Merging this PR allows the release to be distributed through Tauri Updater for auto-updates
          branch: "version-bump-${{ github.event.inputs.version }}-${{ github.run_id }}"
          base: "main"
          add-paths: |
            src-tauri/tauri.conf.json
            latest.json
            package.json
            src-tauri/Cargo.toml
            src-tauri/Cargo.lock
          sign-commits: true

      - name: Generate release notes
        id: generate_notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ github.event.inputs.version }}',
              previous_tag_name: '${{ needs.fetch_previous_version.outputs.previous_version }}'
            });
            
            // Remove lines for version bumps, docs, ci, etc
            let body = data.body;
            const lines = body.split('\n');
            const filtered = lines.filter(line => {
              const trimmed = line.trim();
              if (trimmed.startsWith('* chore: update changelog')) return false;
              if (trimmed.startsWith('* chore(version): bump to')) return false;
              if (trimmed.startsWith('* chore: push notification')) return false;
              if (trimmed.startsWith('* chore(i18n): pull translations from crowdin')) return false;
              if (trimmed.startsWith('* chore(ci):')) return false;
              if (trimmed.startsWith('* ci:')) return false;
              if (trimmed.startsWith('* docs:')) return false;
              return true;
            });
            
            const cleanedBody = filtered.join('\n');
            
            // Save to file
            const fs = require('fs');
            fs.writeFileSync('./release_notes.md', cleanedBody);
            
            console.log('Generated release notes:');
            console.log(cleanedBody);
            
            return cleanedBody;

      - name: Prepare portable executable
        run: |
          # Stop on the first Copy-Item/etc failure - these are non-terminating by default, so
          # without this a missing source file (e.g. from an earlier silently-failed build step)
          # would print an error and keep going, packaging a broken/partial portable zip instead
          # of failing the workflow.
          $ErrorActionPreference = 'Stop'

          # Create portable package directory
          $portableDir = "./portable-package"
          New-Item -ItemType Directory -Force -Path $portableDir
          
          # Copy the executable with the correct name
          Copy-Item "./src-tauri/target/release/Steam Game Idler.exe" -Destination "$portableDir/Steam Game Idler.exe"
          
          # Copy the libs folder
          Copy-Item "./src-tauri/libs" -Destination "$portableDir/libs" -Recurse -Force

          # Copy the LICENSE file
          Copy-Item "./LICENSE" -Destination "$portableDir/LICENSE" -Force
          
          # Create the portable zip
          Compress-Archive -Path "$portableDir/*" -DestinationPath "./src-tauri/target/release/Steam Game Idler_${{ github.event.inputs.version }}_x64-portable.zip" -Force
          
          # Clean up temporary directory
          Remove-Item -Recurse -Force $portableDir
        shell: pwsh

      - name: Create release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Steam Game Idler v${{ github.event.inputs.version }}
          body_path: ./release_notes.md
          files: |
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.exe
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.nsis.zip
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.nsis.zip.sig
            ./src-tauri/target/release/Steam Game Idler_${{ github.event.inputs.version }}_x64-portable.zip

      - name: Cleanup artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: dotnet-libs

  send_discord_notification:
    needs: build_release_bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Send changelog to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANGELOG_FILE="docs/changelogs/${VERSION}.mdx"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION}"
          
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "Error: Changelog file not found: $CHANGELOG_FILE"
            exit 1
          fi
          
          # Extract changelog body after frontmatter (remove everything between --- markers and trim)
          CHANGELOG_BODY=$(awk 'BEGIN{p=0} /^---$/{p++; next} p==2{print}' "$CHANGELOG_FILE" | sed '/^$/d')
          
          # Create JSON payload using jq to properly escape everything
          jq -n \
            --arg version "$VERSION" \
            --arg changelog "$CHANGELOG_BODY" \
            --arg url "$RELEASE_URL" \
            '{content: ("# Steam Game Idler v" + $version + "\n\n" + $changelog + "\n\n[View on GitHub](<" + $url + ">)" + "\n\n<@&1447060344056053841>")}' \
          | curl -H "Content-Type: application/json" \
            -d @- \
            "$DISCORD_WEBHOOK"
