name: Build release bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New Version"
        required: true
      is_major:
        description: "Major update"
        required: false
        type: boolean
        default: false
      force_dotnet_build:
        description: "Force .NET rebuild"
        required: false
        type: boolean
        default: false
      force_pnpm_install:
        description: "Force fresh pnpm install"
        required: false
        type: boolean
        default: false
      force_cargo_clean:
        description: "Force cargo clean"
        required: false
        type: boolean
        default: false
      force_nextjs_build:
        description: "Force Next.js rebuild"
        required: false
        type: boolean
        default: false
      dry_run:
        # Validates a real build without the public side effects of a real release: no Discord
        # ping, no version-bump PR (opening one from a branch this far behind main would show the
        # whole branch diff, not a clean version bump), no public GitHub release. Bundle output
        # goes to a workflow-run artifact instead, downloadable from the run's summary page.
        description: "Skip PR/release/Discord, upload build output as an artifact instead"
        required: false
        type: boolean
        default: false
      dry_run_skip_windows:
        # Only takes effect when dry_run is also true (see build_dotnet_libs'/build_release_bundle's
        # `if:` below) - iterating on a Linux-only fix shouldn't have to pay for a full Windows
        # dotnet+Tauri build every time. build_release_bundle_linux tolerates build_release_bundle
        # being skipped this way (its own `if:` checks for a 'skipped' result, not just 'success') -
        # its dry-run checkout step already falls back to github.ref instead of depending on
        # anything the Windows job produces, so skipping Windows costs it nothing.
        description: "Dry run only - skip the Windows build entirely"
        required: false
        type: boolean
        default: false

run-name: Build release v${{ github.event.inputs.version }}

# Prevents two dispatches from racing (both bumping the same version files / publishing at once).
# cancel-in-progress: false queues a second dispatch behind the first rather than auto-killing it -
# manually cancelling a run yourself from the Actions UI/CLI is unaffected by this and still works
# at any time.
concurrency:
  group: release
  cancel-in-progress: false

# Least privilege by default - only build_release_bundle and build_release_bundle_linux (the jobs
# that actually create the release/PR, push the version-bump commit, and delete their own build
# artifacts) are granted elevated scopes, below.
permissions: {}

jobs:
  fetch_previous_version:
    runs-on: ubuntu-latest
    outputs:
      previous_version: ${{ steps.get_version.outputs.previous_version }}
    steps:
      - name: Get latest release version
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticated request avoids the 60 req/hr unauthenticated rate limit; a token is still
          # valid for this even under this workflow's now-zero default permissions.
          RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/releases/latest)
          PREVIOUS_VERSION=$(echo "$RESPONSE" | jq -r .tag_name)

          if [ -z "$PREVIOUS_VERSION" ] || [ "$PREVIOUS_VERSION" = "null" ]; then
            echo "::error::Failed to fetch latest release version from GitHub API. Response was:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Found previous version: $PREVIOUS_VERSION"
          echo "previous_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT

  validate_version:
    runs-on: ubuntu-latest
    needs: fetch_previous_version
    steps:
      - name: Validate semantic version format
        id: validate_format
        uses: matt-usurp/validate-semver@v2
        with:
          version: ${{ github.event.inputs.version }}
      
      - name: Validate version increment
        uses: actions/github-script@v7
        with:
          script: |
            const prev = '${{ needs.fetch_previous_version.outputs.previous_version }}'.replace(/^v/, '');
            const next = '${{ github.event.inputs.version }}'.replace(/^v/, '');
            
            const [prevMajor, prevMinor, prevPatch] = prev.split('.').map(Number);
            const [nextMajor, nextMinor, nextPatch] = next.split('.').map(Number);
            
            // Check if it's a valid increment
            const isMajor = nextMajor > prevMajor && nextMinor === 0 && nextPatch === 0;
            const isMinor = nextMajor === prevMajor && nextMinor > prevMinor && nextPatch === 0;
            const isPatch = nextMajor === prevMajor && nextMinor === prevMinor && nextPatch === prevPatch + 1;
            
            if (!isMajor && !isMinor && !isPatch) {
              const validOptions = [
                `${prevMajor}.${prevMinor}.${prevPatch + 1} (patch)`,
                `${prevMajor}.${prevMinor + 1}.0 (minor)`,
                `${prevMajor + 1}.0.0 (major)`
              ];

              core.setFailed(
                `❌ Invalid version increment!\n\n` +
                `Current: ${prev}\n` +
                `Attempted: ${next}\n\n` +
                `Valid options:\n${validOptions.map(v => `  • ${v}`).join('\n')}`
              );
              return;
            }

            console.log(`✅ Valid version increment: ${prev} → ${next}`);
            await core.summary
              .addHeading('Release version')
              .addRaw(`Bumping ${prev} → ${next}`)
              .write();

  build_dotnet_libs:
    runs-on: windows-latest
    needs: [fetch_previous_version, validate_version]
    # Skipped only on a dry run that also requests dry_run_skip_windows - its only consumer
    # (build_release_bundle below) is skipped by the same condition, so there's nothing left to
    # build this for in that case.
    if: github.event.inputs.dry_run != 'true' || github.event.inputs.dry_run_skip_windows != 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Prepare NuGet cache directory
        run: |
          # Create directory if it doesn't exist
          mkdir -Force "C:\Users\runneradmin\.nuget\packages"
          # Get and report actual NuGet packages location
          dotnet nuget locals global-packages --list
        shell: pwsh

      - name: Setup NuGet cache
        id: cache-msbuild
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET cache
        id: cache-dotnet
        uses: actions/cache@v4
        with:
          path: src-tauri/libs/
          key: ${{ runner.os }}-dotnet-${{ hashFiles('libs/**/*.cs', 'libs/**/*.csproj', '.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      - name: Build SteamUtility
        if: steps.cache-dotnet.outputs.cache-hit != 'true' || github.event.inputs.force_dotnet_build == 'true'
        # -o is resolved relative to this step's cwd (repo root), not the project file's directory.
        # DebugType=none - tauri.conf.json bundles everything under libs/*, so a .pdb here would
        # otherwise ship in the installer for nothing. Single dotnet publish step now that the old
        # Steamworks.NET SteamUtility and SteamKit2 SteamAgent projects have been merged into one.
        # $ErrorActionPreference/$LASTEXITCODE check: a pwsh step's pass/fail is the wrapping
        # pwsh.exe exit code, NOT $LASTEXITCODE - a failing dotnet publish would otherwise report
        # this step green and silently carry a stale/missing SteamUtility.exe into the release.
        # PublishSingleFile=false (deliberately, was true) - the bundled single-file exe was
        # confirmed via side-by-side VirusTotal testing to be what SecureAge's engine flags as
        # malicious (a self-extracting single-file .NET bundle reads as packer-like behavior to its
        # heuristics); the plain multi-file self-contained output came back clean across several
        # test configurations. SteamUtility.csproj's RemoveDiagnosticOnlyPublishFiles target prunes
        # the resulting loose-file output back down close to the old single-file size.
        run: |
          $ErrorActionPreference = 'Stop'
          dotnet publish .\libs\SteamUtility\SteamUtility.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishTrimmed=true -p:DebugType=none -o .\src-tauri\libs\
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed with exit code $LASTEXITCODE" }
        shell: pwsh

      - name: Upload built .NET libraries
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-libs
          path: src-tauri/libs/
          retention-days: 1

      - name: Record dotnet build summary
        shell: pwsh
        run: |
          $usedCache = "${{ steps.cache-dotnet.outputs.cache-hit }}" -eq 'true' -and "${{ github.event.inputs.force_dotnet_build }}" -ne 'true'
          $source = if ($usedCache) { 'cache' } else { 'fresh build' }
          "## .NET build`nSteamUtility.exe: $source" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  # Agent-mode-only daemon build for Linux (libs/SteamUtility.csproj excludes Cli/**/Steamworks.NET
  # for any RuntimeIdentifier != win-x64). Runs on plain ubuntu-latest, not the pinned older base
  # build_release_bundle_linux uses below - a self-contained .NET publish for linux-x64 bundles its
  # own portable runtime, unlike the native Rust/GTK build, which needs the oldest-supported base
  # to avoid raising the binary's minimum glibc requirement.
  build_dotnet_libs_linux:
    runs-on: ubuntu-latest
    needs: [fetch_previous_version, validate_version]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup NuGet cache
        id: cache-msbuild
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET cache
        id: cache-dotnet
        uses: actions/cache@v4
        with:
          path: src-tauri/libs/
          key: ${{ runner.os }}-dotnet-linux-${{ hashFiles('libs/**/*.cs', 'libs/**/*.csproj', '.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-linux-

      - name: Build SteamUtility (daemon-only)
        if: steps.cache-dotnet.outputs.cache-hit != 'true' || github.event.inputs.force_dotnet_build == 'true'
        # No .exe extension on Linux - steam_utility_exe.rs::locate() branches on #[cfg(windows)]
        # for this. PublishSingleFile=false to match build_dotnet_libs' Windows job (#1953) - that
        # switch was to dodge SecureAge's VirusTotal false-positive flag on a self-extracting
        # single-file bundle, confirmed there for the .exe specifically, not independently
        # reproduced here for the Linux ELF equivalent - but there's no reason to leave this
        # artifact on the one publish mode already proven to trip AV heuristics on the other
        # platform when matching costs nothing (SteamUtility.csproj's RemoveDiagnosticOnlyPublishFiles
        # target already handles multi-file cleanup for either RID).
        run: |
          set -euo pipefail
          dotnet publish ./libs/SteamUtility/SteamUtility.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=false -p:PublishTrimmed=true -p:DebugType=none -o ./src-tauri/libs/

      - name: Upload built .NET libraries
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-libs-linux
          path: src-tauri/libs/
          retention-days: 1

      - name: Record dotnet build summary
        run: |
          if [ "${{ steps.cache-dotnet.outputs.cache-hit }}" = "true" ] && [ "${{ github.event.inputs.force_dotnet_build }}" != "true" ]; then
            SOURCE="cache"
          else
            SOURCE="fresh build"
          fi
          echo "## .NET build (Linux)" >> "$GITHUB_STEP_SUMMARY"
          echo "SteamUtility: $SOURCE" >> "$GITHUB_STEP_SUMMARY"

  build_release_bundle:
    needs: [build_dotnet_libs, fetch_previous_version, validate_version]
    # Same skip condition as build_dotnet_libs above - build_release_bundle_linux tolerates this
    # job being skipped (see its own `if:` below), so a Linux-only dry run never needs this at all.
    if: github.event.inputs.dry_run != 'true' || github.event.inputs.dry_run_skip_windows != 'true'
    timeout-minutes: 30
    runs-on: windows-latest
    permissions:
      contents: write # create the GitHub release (softprops/action-gh-release)
      pull-requests: write # open the version-bump PR
      actions: write # delete the dotnet-libs artifact in the cleanup step
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm cache
        id: cache-pnpm
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.OS }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.OS }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies (pnpm)
        if: steps.cache-pnpm.outputs.cache-hit != 'true' || github.event.inputs.force_pnpm_install == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          pnpm install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) { throw "pnpm install failed with exit code $LASTEXITCODE" }

      - name: Setup Next.js cache
        id: cache-nextjs
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.OS }}-nextjs-${{ hashFiles('**.[jt]sx', '**.[jt]s', 'package.json') }}
          restore-keys: |
            ${{ runner.OS }}-nextjs-

      - name: Clean Next.js cache
        if: steps.cache-nextjs.outputs.cache-hit != 'true' || github.event.inputs.force_nextjs_build == 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path ".next") {
            Remove-Item -Recurse -Force .next
            Write-Host "Next.js cache cleared"
          } else {
            Write-Host "No Next.js cache found"
          }
        shell: pwsh

      - name: Setup Rust cache
        id: cache-rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Clean Cargo artifacts
        if: steps.cache-rust.outputs.cache-hit != 'true' || github.event.inputs.force_cargo_clean == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cargo clean
          if ($LASTEXITCODE -ne 0) { throw "cargo clean failed with exit code $LASTEXITCODE" }
        working-directory: ./src-tauri

      - name: Update version numbers
        id: update-versions
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $previousVersion = "${{ needs.fetch_previous_version.outputs.previous_version }}"
          $newVersion = "${{ github.event.inputs.version }}"

          # latest.json is what the Tauri updater plugin polls on every existing install - if this
          # replace silently no-ops (e.g. $previousVersion doesn't textually match file content),
          # the release still gets published but no existing user's auto-update would ever fire,
          # since latest.json would still claim the old version is current. Verify both files
          # actually changed rather than trusting the replace succeeded.
          #
          # Get-Content returns a string array (one element per line). Applying -match/-notmatch
          # to an array does NOT yield a boolean - it returns the subset of elements that satisfy
          # the condition, which for -notmatch is "every line that doesn't contain the version"
          # (i.e. almost every line in the file). That array is always non-empty and therefore
          # always truthy, so the check would throw unconditionally regardless of whether the
          # replace worked. Join to a single string first so -notmatch actually evaluates the
          # whole file content as one match target.
          $tauriConf = Get-Content src-tauri/tauri.conf.json
          $updatedTauriConf = $tauriConf -replace [regex]::Escape($previousVersion), $newVersion
          if (($updatedTauriConf -join "`n") -notmatch [regex]::Escape($newVersion)) {
            throw "tauri.conf.json version replace did not match - previous_version ($previousVersion) may not match file content"
          }
          $updatedTauriConf | Set-Content src-tauri/tauri.conf.json

          $latest = Get-Content latest.json
          $updatedLatest = $latest -replace [regex]::Escape($previousVersion), $newVersion
          if (($updatedLatest -join "`n") -notmatch [regex]::Escape($newVersion)) {
            throw "latest.json version replace did not match - previous_version ($previousVersion) may not match file content"
          }
          $updatedLatest | Set-Content latest.json

          # package.json/Cargo.toml are stuck at 0.1.0, not the previous release tag, so a
          # $previousVersion replace (as above) would silently match nothing. Bump each directly
          # instead. Neither value feeds the shipped exe's FileVersion/ProductVersion (that comes
          # from tauri.conf.json alone) - this is version-string hygiene only.
          npm pkg set version="$newVersion"
          if ($LASTEXITCODE -ne 0) { throw "npm pkg set failed with exit code $LASTEXITCODE" }

          # Cargo.toml has exactly one `version = "..."` line (under [package], no dependency-table
          # collision) - confirmed via grep before relying on this regex.
          $cargoToml = Get-Content src-tauri/Cargo.toml
          $updatedCargoToml = $cargoToml -replace '^version = "[^"]+"$', "version = `"$newVersion`""
          if (($updatedCargoToml -join "`n") -notmatch [regex]::Escape($newVersion)) {
            throw "Cargo.toml version replace did not match expected 'version = `"...`"' line"
          }
          $updatedCargoToml | Set-Content src-tauri/Cargo.toml

      - name: Create .env file
        run: |
          echo "KEY=${{ secrets.KEY }}" > .env
        shell: pwsh
        working-directory: ${{ github.workspace }}

      - name: Download built .NET libraries
        uses: actions/download-artifact@v4
        with:
          name: dotnet-libs
          path: src-tauri/libs/

      - name: Build and package Tauri app
        run: |
          $ErrorActionPreference = 'Stop'
          $env:NEXT_TELEMETRY_DISABLED = "1"
          $env:TAURI_CI = "1"
          pnpm tauri build
          if ($LASTEXITCODE -ne 0) { throw "pnpm tauri build failed with exit code $LASTEXITCODE" }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh

      - name: Record build artifacts summary
        shell: pwsh
        run: |
          $bundleDir = "./src-tauri/target/release/bundle/nsis"
          $produced = if (Test-Path $bundleDir) { Get-ChildItem $bundleDir -File | ForEach-Object { $_.Name } } else { @() }
          $lines = @("## Tauri bundle output")
          if ($produced.Count -eq 0) {
            $lines += "No files found in $bundleDir"
          } else {
            $lines += $produced | ForEach-Object { "- $_" }
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Update latest.json with signature
        shell: pwsh
        # latest.json's signature is what the Tauri updater verifies against on every existing
        # install - if this python invocation throws (e.g. the .sig file is missing because the
        # build silently failed earlier) and the exit code goes unchecked, this step would report
        # green while shipping a stale/wrong signature, breaking auto-update for the whole release.
        run: |
          python -c "
          import base64
          import json

          nsis_signature_path = './src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.nsis.zip.sig'
          latest_json_path = './latest.json'

          with open(nsis_signature_path, 'r') as sig_file:
              new_signature = sig_file.read().strip()

          with open(latest_json_path, 'r') as json_file:
              latest_json = json.load(json_file)

          latest_json['platforms']['windows-x86_64']['signature'] = new_signature

          is_major = True if '${{ github.event.inputs.is_major }}' == 'true' else False
          latest_json['major'] = is_major

          with open(latest_json_path, 'w') as json_file:
              json.dump(latest_json, json_file, indent=2)

          print('Updated latest.json with new signature')
          "
          if ($LASTEXITCODE -ne 0) { throw "Updating latest.json signature failed with exit code $LASTEXITCODE" }

      - uses: actions/create-github-app-token@v1
        id: generate-token
        if: github.event.inputs.dry_run != 'true'
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create PR for version changes
        id: create-pr
        # Skipped on a dry run - main has none of this branch's commits yet, so a PR opened from
        # here would show the entire branch diff against main (computed at the merge-base), not a
        # clean version bump. build_release_bundle_linux falls back to checking out github.ref
        # directly instead of this step's branch when dry_run is set - see that job's checkout step.
        if: github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "chore(version): bump to ${{ github.event.inputs.version }}"
          title: "chore(version): bump to ${{ github.event.inputs.version }}"
          body: |
            Automated version bump for release [v${{ github.event.inputs.version }}](https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.version }})

            Generated by workflow run [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Merging this PR allows the release to be distributed through Tauri Updater for auto-updates
          branch: "version-bump-${{ github.event.inputs.version }}-${{ github.run_id }}"
          base: "main"
          add-paths: |
            src-tauri/tauri.conf.json
            latest.json
            package.json
            src-tauri/Cargo.toml
            src-tauri/Cargo.lock
          sign-commits: true

      - name: Generate release notes
        id: generate_notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ github.event.inputs.version }}',
              previous_tag_name: '${{ needs.fetch_previous_version.outputs.previous_version }}'
            });
            
            // Remove lines for version bumps, docs, ci, etc
            let body = data.body;
            const lines = body.split('\n');
            const filtered = lines.filter(line => {
              const trimmed = line.trim();
              if (trimmed.startsWith('* chore: update changelog')) return false;
              if (trimmed.startsWith('* chore(version): bump to')) return false;
              if (trimmed.startsWith('* chore: push notification')) return false;
              if (trimmed.startsWith('* chore(i18n): pull translations from crowdin')) return false;
              if (trimmed.startsWith('* chore(ci):')) return false;
              if (trimmed.startsWith('* ci:')) return false;
              if (trimmed.startsWith('* docs:')) return false;
              return true;
            });
            
            const cleanedBody = filtered.join('\n');
            
            // Save to file
            const fs = require('fs');
            fs.writeFileSync('./release_notes.md', cleanedBody);
            
            console.log('Generated release notes:');
            console.log(cleanedBody);
            
            return cleanedBody;

      - name: Prepare portable executable
        run: |
          # Stop on the first Copy-Item/etc failure - these are non-terminating by default, so
          # without this a missing source file (e.g. from an earlier silently-failed build step)
          # would print an error and keep going, packaging a broken/partial portable zip instead
          # of failing the workflow.
          $ErrorActionPreference = 'Stop'

          # Create portable package directory
          $portableDir = "./portable-package"
          New-Item -ItemType Directory -Force -Path $portableDir
          
          # Copy the executable with the correct name
          Copy-Item "./src-tauri/target/release/Steam Game Idler.exe" -Destination "$portableDir/Steam Game Idler.exe"
          
          # Copy the libs folder
          Copy-Item "./src-tauri/libs" -Destination "$portableDir/libs" -Recurse -Force

          # Copy the LICENSE file
          Copy-Item "./LICENSE" -Destination "$portableDir/LICENSE" -Force

          # Copy the third-party notices file (mirrors tauri.conf.json's bundle.resources, which
          # only applies to the NSIS installer - the portable zip is staged manually here so it
          # needs the same file copied explicitly).
          Copy-Item "./src-tauri/THIRD-PARTY-NOTICES.md" -Destination "$portableDir/THIRD-PARTY-NOTICES.md" -Force

          # Create the portable zip
          Compress-Archive -Path "$portableDir/*" -DestinationPath "./src-tauri/target/release/Steam Game Idler_${{ github.event.inputs.version }}_x64-portable.zip" -Force
          
          # Clean up temporary directory
          Remove-Item -Recurse -Force $portableDir
        shell: pwsh

      - name: Create release
        if: github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Steam Game Idler v${{ github.event.inputs.version }}
          body_path: ./release_notes.md
          files: |
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.exe
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.nsis.zip
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.nsis.zip.sig
            ./src-tauri/target/release/Steam Game Idler_${{ github.event.inputs.version }}_x64-portable.zip

      - name: Upload build output (dry run)
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle-dry-run
          retention-days: 3
          path: |
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.exe
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.nsis.zip
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ github.event.inputs.version }}_x64-setup.nsis.zip.sig
            ./src-tauri/target/release/Steam Game Idler_${{ github.event.inputs.version }}_x64-portable.zip
            ./latest.json

      - name: Cleanup artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: dotnet-libs

  # Builds the Linux AppImage/deb/rpm bundle, adds it to the same GitHub release build_release_bundle
  # just created, and appends a `platforms.linux-x86_64` entry to the same version-bump PR's
  # latest.json. Deliberately depends on build_release_bundle (not just fetch_previous_version/
  # validate_version) so it runs *after* that job's version-bump branch/PR and GitHub release both
  # already exist - this job checks out that same branch (already at the bumped version, so no need
  # to redo the tauri.conf.json/package.json/Cargo.toml edits here) and pushes one more commit onto
  # it, and appends assets to the same release tag rather than creating a second one.
  #
  # runs-on: ubuntu-22.04, NOT ubuntu-latest and NOT a `container:` image - a pinned, specific-version
  # GitHub-hosted runner is the oldest still-current base with WebKitGTK 4.1 available directly from
  # apt (Tauri's own documented recommendation - building against a newer glibc/webkit2gtk than a
  # user's system has raises the compiled binary's minimum required version and it refuses to launch
  # on anything older). A real VM/native runner also sidesteps the FUSE-in-a-container problems the
  # AppImage tooling (linuxdeploy) is known to hit under Docker.
  build_release_bundle_linux:
    needs: [build_dotnet_libs_linux, build_release_bundle]
    # always() overrides the default "every job in needs succeeded" gate, so this still runs when
    # build_release_bundle was deliberately skipped (dry_run_skip_windows) - but not when it
    # actually failed for real, which the explicit result checks below still catch.
    if: |
      always() &&
      needs.build_dotnet_libs_linux.result == 'success' &&
      (needs.build_release_bundle.result == 'success' || needs.build_release_bundle.result == 'skipped')
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    permissions:
      contents: write # push the latest.json update to the version-bump branch; upload release assets
      actions: write # delete the dotnet-libs-linux artifact in the cleanup step
    steps:
      # Generates a token for the same GitHub App (sgi-actions) that build_release_bundle's
      # create-pull-request step already commits as. Without this, the later "Commit latest.json
      # update" step falls back to actions/checkout's default GITHUB_TOKEN-based identity
      # (github-actions[bot]) - a second, different bot committing onto the same PR that
      # sgi-actions[bot] opened. Skipped on a dry run to match build_release_bundle's own gating -
      # there's no branch to push to in that case anyway.
      - uses: actions/create-github-app-token@v1
        id: generate-token
        if: github.event.inputs.dry_run != 'true'
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # The GitHub-recommended way to build a GitHub App's bot commit-author email
      # (<user-id>+<app-slug>[bot]@users.noreply.github.com) - the numeric ID isn't guessable and
      # has to be looked up via the API using the token minted above.
      - name: Get GitHub App user ID
        id: get-user-id
        if: github.event.inputs.dry_run != 'true'
        run: echo "user-id=$(gh api "/users/${{ steps.generate-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Checkout version-bump branch
        # On a dry run, build_release_bundle never pushes this branch (its create-pull-request step
        # is skipped - see that job's comment), so fall back to the ref this workflow was actually
        # dispatched from. That ref still gets a real build; it just carries whatever version is
        # already committed in tauri.conf.json rather than the freshly-bumped one, which doesn't
        # matter for a dry run's purpose (proving the Linux job itself works).
        #
        # token: uses the app token (real run) so every git operation in this job - including the
        # later push - authenticates as sgi-actions[bot] instead of the default GITHUB_TOKEN
        # identity. Falls back to github.token on a dry run, matching pre-existing behavior exactly
        # (generate-token is skipped then, so its output would otherwise be empty).
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.dry_run == 'true' && github.ref || format('version-bump-{0}-{1}', github.event.inputs.version, github.run_id) }}
          token: ${{ github.event.inputs.dry_run == 'true' && github.token || steps.generate-token.outputs.token }}

      - name: Install Linux system dependencies
        # webkit2gtk/javascriptcoregtk are pinned to 2.44.3-0ubuntu0.22.04.1, the last version
        # published before a confirmed, still-open upstream WebKitGTK regression (bugs.webkit.org
        # #297921, "[GTK] EGL_BAD_PARAMETER crash") - every release after 2.44 can fail EGL display
        # creation on Wayland with certain graphics drivers, aborting before any window ever renders
        # (same root cause and fix as gitbutlerapp/gitbutler#5282).
        #
        # TESTED AND REJECTED (2026-07-20): tried bumping this pin to 2.50.4-0ubuntu0.22.04.1 to
        # see whether a modern webkit2gtk would let the native-Wayland fix (main.rs, commit
        # 1c4ee17f) actually eliminate the AppImage's XWayland lag - a real CI build + VM test
        # confirmed 2.50.4 still hits the identical EGL_BAD_PARAMETER crash this pin exists to
        # avoid (plus a new, separate GIO-module symbol mismatch on top). The upstream bug is
        # evidently still unfixed at 2.50.4 (consistent with bugs.webkit.org #297921 having fresh
        # reports on 2.48.5/2.49.4 as of late 2025). Do not retry a newer pin without a real
        # dry-run + VM round-trip confirming both the crash stays gone and the lag actually
        # improves - see .claude/cross-platform/appimage-egl-wayland-research.md for the full
        # history before trying this again.
        #
        # Ubuntu's live jammy-updates/jammy-security archives only keep the *current*
        # security-patched version downloadable, not superseded historical ones, so the pinned
        # version has to come from snapshot.ubuntu.com (Canonical's dated-archive-snapshot service)
        # rather than a plain apt-cache lookup. Pinned to the 2024-10-01 snapshot, which predates
        # the first broken version (2.46.1, published 2024-10-22). libwebkit2gtk-4.1-* lives in
        # `universe`, libjavascriptcoregtk-4.1-* lives in `main` - both components are needed on
        # the source line below. Both `-dev` packages also hard-depend on a matching-version
        # `gir1.2-*` introspection package that apt won't auto-resolve on its own, so those are
        # requested explicitly too. The snapshot source is removed again immediately after use so
        # it can't affect any other package installed later in this job.
        #
        # snapshot.ubuntu.com has been observed intermittently 500ing on individual index/pool
        # fetches (confirmed twice in a row on 2026-07-23/24, from two different backend IPs -
        # consistent with a subset of nodes in its backend pool being unhealthy rather than the
        # snapshot itself being gone). retry() re-runs a whole failed apt invocation with backoff;
        # Acquire::Retries lets apt itself retry an individual download within one invocation. Together
        # these let the job self-heal through that kind of transient failure instead of needing a
        # manual "Re-run failed jobs" every time.
        run: |
          set -euo pipefail

          retry() {
            local attempt=1
            local max_attempts=5
            local delay=15
            until "$@"; do
              if (( attempt >= max_attempts )); then
                echo "::error::Command failed after $max_attempts attempts: $*"
                return 1
              fi
              echo "Attempt $attempt/$max_attempts failed, retrying in ${delay}s..."
              attempt=$((attempt + 1))
              sleep "$delay"
            done
          }

          APT_OPTS=(-o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30)

          retry sudo apt-get "${APT_OPTS[@]}" update
          WEBKIT_VERSION="2.44.3-0ubuntu0.22.04.1"
          echo "deb https://snapshot.ubuntu.com/ubuntu/20241001T000000Z/ jammy-updates main universe" | sudo tee /etc/apt/sources.list.d/webkit-snapshot.list
          retry sudo apt-get "${APT_OPTS[@]}" update
          retry sudo apt-get "${APT_OPTS[@]}" install -y \
            libwebkit2gtk-4.1-0="$WEBKIT_VERSION" \
            libwebkit2gtk-4.1-dev="$WEBKIT_VERSION" \
            libjavascriptcoregtk-4.1-0="$WEBKIT_VERSION" \
            libjavascriptcoregtk-4.1-dev="$WEBKIT_VERSION" \
            gir1.2-webkit2-4.1="$WEBKIT_VERSION" \
            gir1.2-javascriptcoregtk-4.1="$WEBKIT_VERSION"
          sudo apt-mark hold \
            libwebkit2gtk-4.1-0 libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-0 libjavascriptcoregtk-4.1-dev \
            gir1.2-webkit2-4.1 gir1.2-javascriptcoregtk-4.1
          sudo rm /etc/apt/sources.list.d/webkit-snapshot.list
          retry sudo apt-get "${APT_OPTS[@]}" update
          retry sudo apt-get "${APT_OPTS[@]}" install -y \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            build-essential \
            curl \
            wget \
            file \
            patchelf \
            xdg-utils \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm cache
        id: cache-pnpm
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.OS }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.OS }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies (pnpm)
        if: steps.cache-pnpm.outputs.cache-hit != 'true' || github.event.inputs.force_pnpm_install == 'true'
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Setup Next.js cache
        id: cache-nextjs
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.OS }}-nextjs-${{ hashFiles('**.[jt]sx', '**.[jt]s', 'package.json') }}
          restore-keys: |
            ${{ runner.OS }}-nextjs-

      - name: Clean Next.js cache
        # Mirrors build_release_bundle's equivalent Windows step - without this, every Linux
        # release build did a fully uncached Next.js build from scratch every time (not a
        # correctness bug, just wasted CI minutes and no respect for force_nextjs_build).
        if: steps.cache-nextjs.outputs.cache-hit != 'true' || github.event.inputs.force_nextjs_build == 'true'
        run: |
          set -euo pipefail
          if [ -d ".next" ]; then
            rm -rf .next
            echo "Next.js cache cleared"
          else
            echo "No Next.js cache found"
          fi

      - name: Setup Rust cache
        id: cache-rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Clean Cargo artifacts
        if: steps.cache-rust.outputs.cache-hit != 'true' || github.event.inputs.force_cargo_clean == 'true'
        run: cargo clean
        working-directory: ./src-tauri

      - name: Create .env file
        run: echo "KEY=${{ secrets.KEY }}" > .env
        working-directory: ${{ github.workspace }}

      - name: Download built .NET libraries
        uses: actions/download-artifact@v4
        with:
          name: dotnet-libs-linux
          path: src-tauri/libs/

      - name: Make SteamUtility executable
        # tar/zip artifact upload-download round-trips don't reliably preserve the Unix executable
        # bit - Program.cs's daemon spawn (steam_utility_exe.rs::locate()) needs +x to run at all.
        run: chmod +x src-tauri/libs/SteamUtility

      - name: Build and package Tauri app
        # tauri.conf.json's bundle.targets: "all" produces AppImage + deb + rpm automatically once
        # running on a Linux host - no separate per-format build invocation needed.
        run: |
          set -euo pipefail
          export NEXT_TELEMETRY_DISABLED=1
          export TAURI_CI=1
          pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Record build artifacts summary
        run: |
          echo "## Tauri bundle output (Linux)" >> "$GITHUB_STEP_SUMMARY"
          for dir in appimage deb rpm; do
            bundleDir="./src-tauri/target/release/bundle/$dir"
            if [ -d "$bundleDir" ]; then
              find "$bundleDir" -maxdepth 1 -type f -printf '- %f\n' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No files found in $bundleDir" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Update latest.json with signature
        # Mirrors the Windows job's equivalent step, but discovers the updater artifact's actual
        # filename at runtime instead of assuming one, since Tauri's exact AppImage-bundle naming
        # convention isn't guaranteed - a hardcoded filename would be a silent latest.json footgun
        # if it's ever wrong. GitHub replaces literal spaces in an uploaded release asset's
        # filename with dots in its generated download URL - replicated here to match.
        run: |
          set -euo pipefail
          python3 -c "
          import glob
          import json
          import os

          bundle_dir = './src-tauri/target/release/bundle/appimage'
          sig_matches = glob.glob(os.path.join(bundle_dir, '*.AppImage.tar.gz.sig'))
          if not sig_matches:
              raise SystemExit(f'No .AppImage.tar.gz.sig file found in {bundle_dir}')
          sig_path = sig_matches[0]
          artifact_name = os.path.basename(sig_path)[: -len('.sig')]

          with open(sig_path, 'r') as sig_file:
              new_signature = sig_file.read().strip()

          latest_json_path = './latest.json'
          with open(latest_json_path, 'r') as json_file:
              latest_json = json.load(json_file)

          url = f\"https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.version }}/{artifact_name.replace(' ', '.')}\"
          latest_json['platforms']['linux-x86_64'] = {'signature': new_signature, 'url': url}

          with open(latest_json_path, 'w') as json_file:
              json.dump(latest_json, json_file, indent=2)

          print(f'Updated latest.json with linux-x86_64 entry: {url}')
          "

      - name: Commit latest.json update to version-bump branch
        # Appends to the same branch/PR build_release_bundle's create-pull-request step opened -
        # not a second PR. A plain git push (not create-pull-request again) is enough since the
        # branch and PR already exist; the checkout step above already persisted the sgi-actions
        # app token as this job's git credentials, so this push authenticates as the same bot that
        # opened the PR rather than the job's own default GITHUB_TOKEN identity.
        # Skipped entirely on a dry run - there's no version-bump branch to push to (the checkout
        # step above fell back to github.ref instead), and pushing straight onto whatever real
        # branch that is would be exactly the kind of unwanted side effect dry_run exists to avoid.
        if: github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          git config user.name "${{ steps.generate-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.get-user-id.outputs.user-id }}+${{ steps.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add latest.json
          if git diff --cached --quiet; then
            echo "No latest.json changes to commit"
          else
            git commit -m "chore(version): add linux-x86_64 entry to latest.json"
            git push origin "HEAD:version-bump-${{ github.event.inputs.version }}-${{ github.run_id }}"
          fi

      - name: Add Linux bundles to release
        if: github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # No body/body_path here on purpose - action-gh-release preserves an existing release's
        # current body/metadata when those inputs are omitted, so this only appends the Linux
        # assets to the release build_release_bundle already created rather than clobbering its
        # generated release notes.
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: |
            ./src-tauri/target/release/bundle/appimage/*.AppImage
            ./src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            ./src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            ./src-tauri/target/release/bundle/deb/*.deb
            ./src-tauri/target/release/bundle/rpm/*.rpm

      - name: Upload build output (dry run)
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle-dry-run
          retention-days: 3
          path: |
            ./src-tauri/target/release/bundle/appimage/*.AppImage
            ./src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            ./src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
            ./src-tauri/target/release/bundle/deb/*.deb
            ./src-tauri/target/release/bundle/rpm/*.rpm
            ./latest.json

      - name: Cleanup artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: dotnet-libs-linux

  send_discord_notification:
    needs: [build_release_bundle, build_release_bundle_linux]
    # Skipped on a dry run - the entire point of dry_run is a real build with none of a real
    # release's public side effects, and this is the one that pings the official Discord server.
    if: github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Send changelog to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANGELOG_FILE="docs/changelogs/${VERSION}.mdx"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION}"
          
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "Error: Changelog file not found: $CHANGELOG_FILE"
            exit 1
          fi
          
          # Extract changelog body after frontmatter (remove everything between --- markers and trim)
          CHANGELOG_BODY=$(awk 'BEGIN{p=0} /^---$/{p++; next} p==2{print}' "$CHANGELOG_FILE" | sed '/^$/d')
          
          # Create JSON payload using jq to properly escape everything
          jq -n \
            --arg version "$VERSION" \
            --arg changelog "$CHANGELOG_BODY" \
            --arg url "$RELEASE_URL" \
            '{content: ("# Steam Game Idler v" + $version + "\n\n" + $changelog + "\n\n[View on GitHub](<" + $url + ">)" + "\n\n<@&1447060344056053841>")}' \
          | curl -H "Content-Type: application/json" \
            -d @- \
            "$DISCORD_WEBHOOK"
