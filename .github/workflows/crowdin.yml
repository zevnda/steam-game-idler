name: Crowdin

on:
  # schedule:
  # - cron: "0 * * * *" # Uncomment this line to run every hour
  workflow_dispatch:

jobs:
  download-translations:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Downloads into the local checkout only - push_translations/create_pull_request are off
      # here so the empty-placeholder cleanup step below can run before anything is committed
      - name: Download Crowdin Translations
        uses: crowdin/github-action@v2
        with:
          config: .github/crowdin.yml
          upload_sources: true
          download_sources: true
          download_translations: true

          export_only_approved: true
          skip_untranslated_strings: true

          push_translations: false
          create_pull_request: false
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Strip Crowdin empty translation placeholders
        run: node scripts/strip-crowdin-empty-translations.mjs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate-token.outputs.token }}
          add-paths: src/i18n/locales/*.json
          branch: chore/i18n-crowdin
          base: main
          title: "chore(i18n): pull translations from crowdin"
          commit-message: "chore(i18n): pull translations from crowdin"
          committer: "sgi-actions[bot] <205271180+sgi-actions[bot]@users.noreply.github.com>"
          author: "sgi-actions[bot] <205271180+sgi-actions[bot]@users.noreply.github.com>"
